<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <!-- Use Streamlit Component JS -->
  <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.3.0/dist/streamlit.js"></script>
  <style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: transparent !important;
        overflow: hidden;
    }
    .mic-button {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
        border: none;
        color: white;
        font-size: 50px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 15px 40px rgba(99, 102, 241, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        -webkit-tap-highlight-color: transparent;
    }
    .mic-button:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 50px rgba(99, 102, 241, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    .mic-button:active {
        transform: scale(0.95);
    }
    .mic-button.recording {
        animation: pulse 1.5s infinite;
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        box-shadow: 0 0 40px rgba(239, 68, 68, 0.8);
    }
    @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body>
  <button class="mic-button" id="micBtn">🎙️</button>
  <script>
    // Initialize the component
    function onRender(event) {
      Streamlit.setFrameHeight(160);
    }
    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(160);

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    const btn = document.getElementById("micBtn");

    btn.onclick = async () => {
      if (!isRecording) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.start();
          isRecording = true;
          btn.classList.add("recording");
          audioChunks = [];
          
          mediaRecorder.ondataavailable = e => {
            audioChunks.push(e.data);
          };
          
          mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: "audio/wav" });
            const arrayBuffer = await blob.arrayBuffer();
            const bytes = new Uint8Array(arrayBuffer);
            
            // Convert to base64
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            const base64String = window.btoa(binary);
            
            // Send back to python
            Streamlit.setComponentValue(base64String);
          };
        } catch (err) {
          console.error("Error accessing mic", err);
          alert("Microphone access denied or not available.");
        }
      } else {
        mediaRecorder.stop();
        isRecording = false;
        btn.classList.remove("recording");
      }
    };
  </script>
</body>
</html>
